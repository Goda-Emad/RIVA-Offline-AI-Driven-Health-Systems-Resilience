<div class="confidence-indicator" id="confidence-indicator">
    <div class="confidence-header">
        <span class="confidence-icon">🎯</span>
        <span class="confidence-title">درجة الثقة في القرار</span>
    </div>
    <div class="confidence-meter">
        <div class="confidence-bar" id="confidence-bar" style="width: 0%"></div>
        <span class="confidence-value" id="confidence-value">0%</span>
    </div>
    <div class="confidence-level" id="confidence-level">
        <span class="level-low">منخفض</span>
        <span class="level-medium">متوسط</span>
        <span class="level-high">مرتفع</span>
    </div>
    <p class="confidence-note" id="confidence-note">
        تعكس درجة الثقة مدى دقة النموذج في هذا التوقع بناءً على البيانات المتاحة.
    </p>
</div>

<style>
.confidence-indicator {
    background: var(--white, #ffffff);
    border-radius: 16px;
    padding: 16px 20px;
    margin: 12px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-right: 4px solid var(--primary, #1a73e8);
}

.confidence-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
}

.confidence-icon {
    font-size: 20px;
}

.confidence-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--dark, #202124);
}

.confidence-meter {
    position: relative;
    height: 8px;
    background: var(--gray-lighter, #e8eaed);
    border-radius: 4px;
    overflow: hidden;
    margin: 12px 0 8px;
}

.confidence-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary, #1a73e8), var(--primary-light, #4285f4));
    border-radius: 4px;
    transition: width 0.5s ease;
    width: 0%;
}

.confidence-value {
    position: absolute;
    right: 0;
    top: -20px;
    font-size: 12px;
    font-weight: bold;
    color: var(--gray, #5f6368);
}

.confidence-level {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 12px;
}

.level-low { 
    color: var(--danger, #ea4335); 
}
.level-medium { 
    color: var(--warning, #fbbc04); 
}
.level-high { 
    color: var(--primary, #1a73e8); 
}

.confidence-note {
    font-size: 11px;
    color: var(--gray, #5f6368);
    margin: 8px 0 0;
    line-height: 1.4;
}

@media (max-width: 768px) {
    .confidence-indicator {
        padding: 12px 16px;
    }
    .confidence-title {
        font-size: 13px;
    }
}
</style>

<script>
function updateConfidence(percentage) {
    const bar = document.getElementById('confidence-bar');
    const value = document.getElementById('confidence-value');
    const note = document.getElementById('confidence-note');
    
    if (bar && value) {
        const percent = Math.min(100, Math.max(0, percentage));
        bar.style.width = percent + '%';
        value.textContent = percent + '%';
        
        let levelText = '';
        let levelClass = '';
        if (percent < 40) {
            levelText = 'منخفض';
            levelClass = 'level-low';
        } else if (percent < 70) {
            levelText = 'متوسط';
            levelClass = 'level-medium';
        } else {
            levelText = 'مرتفع';
            levelClass = 'level-high';
        }
        
        if (note) {
            note.innerHTML = `درجة الثقة: ${levelText} (${percent}%) - تعكس مدى دقة التوقع بناءً على البيانات المتاحة.`;
        }
        
        // تحديث لون الشريط بناءً على النسبة
        if (percent < 40) {
            bar.style.background = `linear-gradient(90deg, var(--danger, #ea4335), var(--danger, #ea4335))`;
        } else if (percent < 70) {
            bar.style.background = `linear-gradient(90deg, var(--warning, #fbbc04), var(--warning, #fbbc04))`;
        } else {
            bar.style.background = `linear-gradient(90deg, var(--primary, #1a73e8), var(--primary-light, #4285f4))`;
        }
    }
}

function resetConfidence() {
    const bar = document.getElementById('confidence-bar');
    const value = document.getElementById('confidence-value');
    const note = document.getElementById('confidence-note');
    
    if (bar) {
        bar.style.width = '0%';
        bar.style.background = `linear-gradient(90deg, var(--primary, #1a73e8), var(--primary-light, #4285f4))`;
    }
    if (value) value.textContent = '0%';
    if (note) note.innerHTML = 'تعكس درجة الثقة مدى دقة النموذج في هذا التوقع بناءً على البيانات المتاحة.';
}
</script>
