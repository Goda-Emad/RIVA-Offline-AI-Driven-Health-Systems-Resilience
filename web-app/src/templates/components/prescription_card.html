<script>
function updatePrescriptionCard(data) {
    if (data.id) document.getElementById('prescription-id').textContent = data.id;
    if (data.date) document.getElementById('prescription-date').textContent = data.date;
    if (data.status) {
        const statusEl = document.getElementById('prescription-status');
        statusEl.textContent = data.status;
        statusEl.className = 'prescription-status';
        if (data.status === 'منتهية') statusEl.classList.add('expired');
        if (data.status === 'مكتملة') statusEl.classList.add('completed');
    }
    if (data.patient_name) document.getElementById('patient-name').textContent = data.patient_name;
    if (data.patient_id) document.getElementById('patient-id').textContent = data.patient_id;
    if (data.doctor_name) document.getElementById('doctor-name').textContent = data.doctor_name;
    if (data.diagnosis) document.getElementById('diagnosis-text').textContent = data.diagnosis;
    
    if (data.medications) {
        const medList = document.getElementById('medications-list');
        medList.innerHTML = data.medications.map(m => `
            <div class="medication-item">
                <div class="med-name">${m.name}</div>
                <div class="med-details">
                    <span class="med-dose">${m.dose}</span>
                    <span class="med-frequency">${m.frequency}</span>
                    <span class="med-duration">${m.duration} يوم</span>
                </div>
            </div>
        `).join('');
    }
    
    if (data.interactions && data.interactions.length > 0) {
        const warningEl = document.getElementById('interactions-warning');
        const warningText = document.getElementById('warning-text');
        warningText.textContent = `⚠️ تم اكتشاف ${data.interactions.length} تداخل دوائي`;
        warningEl.style.display = 'flex';
    }
    
    if (data.notes) {
        const notesEl = document.getElementById('notes-section');
        const notesText = document.getElementById('notes-text');
        notesText.textContent = data.notes;
        notesEl.style.display = 'block';
    }
}

function showPrescriptionQR() {
    window.location.href = '/16_doctor_notes.html';
}

function downloadPrescription() {
    const card = document.getElementById('prescription-card');
    if (!card) return;
    
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
        <html>
        <head>
            <title>روشتة طبية</title>
            <style>
                body { font-family: 'Cairo', sans-serif; padding: 40px; direction: rtl; }
                .prescription { border: 1px solid #ddd; padding: 20px; border-radius: 12px; }
                .header { text-align: center; margin-bottom: 20px; }
                .logo { width: 80px; }
                h2 { color: #1a73e8; }
                table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: right; }
                .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #666; }
            </style>
        </head>
        <body>
            <div class="prescription">
                <div class="header">
                    <img src="/static/assets/images/logo.png" class="logo" alt="RIVA">
                    <h2>روشتة طبية</h2>
                </div>
                ${card.cloneNode(true).innerHTML}
                <div class="footer">
                    <p>هذه روشتة صادرة من نظام ريفا الصحي</p>
                    <p>تم الإصدار: ${new Date().toLocaleString('ar-EG')}</p>
                </div>
            </div>
        </body>
        </html>
    `);
    printWindow.document.close();
    printWindow.print();
}

document.getElementById('qr-btn')?.addEventListener('click', showPrescriptionQR);
document.getElementById('download-btn')?.addEventListener('click', downloadPrescription);
document.getElementById('print-btn')?.addEventListener('click', downloadPrescription);
</script>
