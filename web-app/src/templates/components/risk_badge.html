<div class="risk-badge-card" id="risk-card-container">
    <div class="risk-header">
        <span class="risk-label">مستوى الخطورة</span>
        <div class="risk-dot" id="risk-status-dot"></div>
    </div>
    
    <div class="risk-content">
        <div class="risk-chart">
            <svg viewBox="0 0 36 36" class="circular-chart" id="risk-circle-color">
                <path class="circle-bg"
                    d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <path class="circle" id="risk-stroke"
                    stroke-dasharray="0, 100"
                    d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <text x="18" y="20.35" class="percentage" id="risk-text">0%</text>
            </svg>
        </div>
        
        <div class="risk-info">
            <h4 id="risk-title">جاري الفحص...</h4>
            <p id="risk-desc">يتم الآن تحليل البيانات الحيوية للمريض.</p>
        </div>
    </div>
</div>

<style>
:root {
    /* الألوان دي هي اللي إنت مستخدمها في المشروع */
    --riva-blue: #1a73e8;
    --riva-light-blue: #e8f0fe;
    --riva-success: #34a853;
    --riva-warning: #fbbc04;
    --riva-danger: #ea4335;
    --riva-gray: #5f6368;
}

.risk-badge-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    border: 1px solid #f0f0f0;
    max-width: 280px;
    direction: rtl;
    font-family: 'Cairo', sans-serif;
}

.risk-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.risk-label {
    font-size: 12px;
    color: var(--riva-gray);
    font-weight: 600;
}

.risk-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
}

.risk-content {
    display: flex;
    align-items: center;
    gap: 15px;
}

.risk-chart {
    width: 70px;
}

.circular-chart {
    display: block;
    max-width: 100%;
}

.circle-bg {
    fill: none;
    stroke: #eee;
    stroke-width: 3.8;
}

.circle {
    fill: none;
    stroke-width: 3.8;
    stroke-linecap: round;
    transition: stroke-dasharray 0.5s ease;
}

.percentage {
    fill: #333;
    font-family: sans-serif;
    font-size: 0.5em;
    text-anchor: middle;
    font-weight: bold;
}

.risk-info h4 {
    margin: 0;
    font-size: 14px;
    color: #202124;
}

.risk-info p {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--riva-gray);
    line-height: 1.4;
}

/* حالات الألوان */
.status-safe { stroke: var(--riva-success); }
.status-warning { stroke: var(--riva-warning); }
.status-danger { stroke: var(--riva-danger); }
</style>

<script>
/**
 * دالة لتحديث الكارت بناءً على النسبة
 * @param {number} percent - نسبة الخطورة من 0 لـ 100
 */
function setRiskLevel(percent) {
    const stroke = document.getElementById('risk-stroke');
    const text = document.getElementById('risk-text');
    const title = document.getElementById('risk-title');
    const desc = document.getElementById('risk-desc');
    const dot = document.getElementById('risk-status-dot');

    // تحديث الدائرة والنسبة
    stroke.setAttribute('stroke-dasharray', `${percent}, 100`);
    text.textContent = percent + '%';

    // تغيير الألوان والنصوص حسب النسبة
    if (percent < 30) {
        stroke.setAttribute('class', 'circle status-safe');
        dot.style.background = 'var(--riva-success)';
        title.textContent = 'مستقر';
        desc.textContent = 'المريض في حالة صحية جيدة جداً.';
    } else if (percent < 70) {
        stroke.setAttribute('class', 'circle status-warning');
        dot.style.background = 'var(--riva-warning)';
        title.textContent = 'متوسط';
        desc.textContent = 'يفضل مراجعة التحاليل الأخيرة.';
    } else {
        stroke.setAttribute('class', 'circle status-danger');
        dot.style.background = 'var(--riva-danger)';
        title.textContent = 'مرتفع';
        desc.textContent = 'تنبيه: حالة المريض تتطلب تدخل.';
    }
}

// مثال للتشغيل (تقدر تمسحه بعد ما ترفع الملف)
// setRiskLevel(85); 
</script>
