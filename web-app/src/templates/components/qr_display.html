<div class="qr-modal-overlay" id="qr-modal" style="display: none;">
    <div class="qr-card">
        <div class="qr-header">
            <div class="header-title">
                <span class="header-icon">📱</span>
                <h3>الرمز الشريطي (QR Code)</h3>
            </div>
            <button class="close-btn" id="close-qr-btn" title="إغلاق">&times;</button>
        </div>
        
        <div class="qr-body">
            <div class="qr-image-wrapper">
                <img src="/static/assets/images/qr_placeholder.png" alt="QR Code للمريض" id="qr-code-image">
            </div>
            <p class="qr-hint">يرجى مسح الرمز باستخدام كاميرا الهاتف الذكي للوصول إلى التفاصيل الطبية أو الروشتة.</p>
        </div>
        
        <div class="qr-footer">
            <button class="btn-download-qr" id="download-qr-btn">
                <span>📥</span> حفظ الرمز بالجهاز
            </button>
        </div>
    </div>
</div>

<style>
/* إعدادات النافذة المنبثقة والخلفية الشفافة */
.qr-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(32, 33, 36, 0.6); /* لون غامق شفاف للخلفية */
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    direction: rtl;
    font-family: 'Cairo', 'Tajawal', sans-serif;
}

/* تصميم كارت الـ QR */
.qr-card {
    background: var(--white, #ffffff);
    width: 90%;
    max-width: 400px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    animation: slideUp 0.3s ease-out;
    border-top: 4px solid var(--primary, #1a73e8);
}

@keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.qr-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: linear-gradient(135deg, rgba(26,115,232,0.05), rgba(66,133,244,0.02));
    border-bottom: 1px solid var(--gray-lighter, #e8eaed);
}

.header-title {
    display: flex;
    align-items: center;
    gap: 10px;
}

.header-title h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    color: var(--dark, #202124);
}

.close-btn {
    background: none;
    border: none;
    font-size: 28px;
    color: var(--gray, #5f6368);
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
}

.close-btn:hover {
    color: var(--danger, #ea4335);
}

.qr-body {
    padding: 30px 24px;
    text-align: center;
}

.qr-image-wrapper {
    background: var(--white, #ffffff);
    padding: 15px;
    border-radius: 16px;
    border: 2px dashed var(--primary, #1a73e8);
    display: inline-block;
    margin-bottom: 20px;
    transition: transform 0.3s ease;
}

.qr-image-wrapper:hover {
    transform: scale(1.02);
}

.qr-image-wrapper img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    display: block;
}

.qr-hint {
    font-size: 13px;
    color: var(--gray, #5f6368);
    line-height: 1.6;
    margin: 0;
    padding: 0 10px;
}

.qr-footer {
    padding: 16px 24px;
    background: var(--light, #f8f9fa);
    border-top: 1px solid var(--gray-lighter, #e8eaed);
    display: flex;
    justify-content: center;
}

.btn-download-qr {
    width: 100%;
    padding: 10px 16px;
    background: var(--white, #ffffff);
    border: 1px solid var(--primary, #1a73e8);
    color: var(--primary, #1a73e8);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
}

.btn-download-qr:hover {
    background: var(--primary, #1a73e8);
    color: var(--white, #ffffff);
}
</style>

<script>
// دوال للتحكم في ظهور واختفاء وتحميل الـ QR Code
const qrModal = document.getElementById('qr-modal');
const closeQrBtn = document.getElementById('close-qr-btn');
const downloadQrBtn = document.getElementById('download-qr-btn');

// دالة لفتح النافذة (تقدر تستدعيها من أي زرار في الموقع)
function openQRModal(imageUrl = null) {
    if (imageUrl) {
        document.getElementById('qr-code-image').src = imageUrl;
    }
    qrModal.style.display = 'flex';
}

// إغلاق النافذة عند الضغط على علامة X
closeQrBtn.addEventListener('click', () => {
    qrModal.style.display = 'none';
});

// إغلاق النافذة عند الضغط في أي مكان فارغ خارج الكارت
window.addEventListener('click', (e) => {
    if (e.target === qrModal) {
        qrModal.style.display = 'none';
    }
});

// دالة لتحميل الصورة على جهاز المريض
downloadQrBtn.addEventListener('click', () => {
    const imgSrc = document.getElementById('qr-code-image').src;
    const link = document.createElement('a');
    link.href = imgSrc;
    link.download = 'RIVA_QR_Code.png';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
});
</script>
