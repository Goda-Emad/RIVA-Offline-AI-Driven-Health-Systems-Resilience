# ai-core/training/configs/pregnancy_config.yaml
"""
إعدادات تدريب نموذج الحمل (Pregnancy Risk Model)
"""

# ================== إعدادات البيانات ==================
data:
  path: "data-storage/raw/uci_maternal/maternal_health_clean.csv"
  target_column: "RiskLevel_encoded"
  test_size: 0.2
  random_state: 42
  stratify: true

# ================== الميزات ==================
features:
  base:
    - Age
    - SystolicBP
    - DiastolicBP
    - BS
    - BodyTemp
    - HeartRate
  
  engineered:
    - PulsePressure
    - BP_ratio
    - Temp_Fever
    - HighBP
    - MeanBP
    - AgeRisk
    - HighSugar
  
  interactive:
    - BP_BS_Interaction
    - Total_Risk_Score
    - Age_BP_Interaction
    - BP_Severity
    - BS_Severity

# ================== معايير الفئات ==================
risk_levels:
  mapping:
    0: "low risk"
    1: "mid risk"
    2: "high risk"
  
  thresholds:
    low_risk:
      age: "<35"
      systolic_bp: "<120"
      diastolic_bp: "<80"
      bs: "<7"
    mid_risk:
      age: "35-40"
      systolic_bp: "120-140"
      diastolic_bp: "80-90"
      bs: "7-10"
    high_risk:
      age: ">40"
      systolic_bp: ">140"
      diastolic_bp: ">90"
      bs: ">10"

# ================== إعدادات XGBoost ==================
xgboost:
  params:
    n_estimators: [200, 300, 400]
    max_depth: [4, 6, 8]
    learning_rate: [0.05, 0.1, 0.15]
    subsample: [0.7, 0.8, 0.9]
    colsample_bytree: [0.7, 0.8, 0.9]
    min_child_weight: [1, 3, 5]
    scale_pos_weight: [1, 2, 3]
  
  fixed_params:
    objective: "multi:softprob"
    num_class: 3
    random_state: 42
    eval_metric: "mlogloss"
    use_label_encoder: false

# ================== إعدادات RandomForest ==================
random_forest:
  params:
    n_estimators: 300
    max_depth: 8
    min_samples_split: 5
    min_samples_leaf: 2
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1

# ================== إعدادات LightGBM ==================
lightgbm:
  params:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.1
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1
    verbose: -1

# ================== إعدادات Voting Classifier ==================
ensemble:
  voting: "soft"
  weights: [2, 1.5, 1.5]  # [XGBoost, RF, LGBM]

# ================== إعدادات Cross Validation ==================
cv:
  n_folds: 3
  scoring: "f1_macro"
  random_state: 42

# ================== إعدادات SHAP ==================
shap:
  enabled: true
  max_display: 15
  sample_size: 100  # عدد العينات لتحليل SHAP

# ================== مسارات الحفظ ==================
paths:
  models: "ai-core/models/pregnancy"
  reports: "business-intelligence/performance"
  shap: "business-intelligence/explainability"

# ================== إعدادات التقارير ==================
reporting:
  generate_confusion_matrix: true
  generate_feature_importance: true
  generate_shap_plots: true
  generate_performance_report: true
  top_k_features: 15

# ================== إعدادات الـ logging ==================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_file: "training_pregnancy.log"
